on:
  # Regra 1: execução manual
  workflow_dispatch:

  # Regra 2: agendamento diário às 02:00
  schedule:
    - cron: '0 2 * * *'

  # Regras 3 e 4: push com filtros
  push:
    branches:
      - 'feature/**'
    paths:
      - 'src/**'
      - '!src/docs/**'


jobs:
  job_gerador:
    runs-on: ubuntu-latest

    steps:
      - name: Simular build e gerar relatórios 
        run: |
          mkdir saida_build
          echo "Relatório 1 gerado" > saida_build/relatorio1.txt
          echo "Relatório 2 gerado" > saida_build/relatorio2.txt

      - name: Upload dos relatórios como artefato
        uses: actions/upload-artifact@v4
        with:
          name: meus-relatorios-oficiais
          path: saida_build/
  job_auditoria:
    runs-on: ubuntu-latest
    needs: job_gerador

    steps:
      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          name: meus-relatorios-oficiais

      - name: Verificar arquivos baixados
        run: |
          ls -R
          cat relatorio1.txt
